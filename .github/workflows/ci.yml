name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Push Snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Extract branch name
        run: echo "BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '-')" >> $GITHUB_ENV

      - name: Build Binary
        run: CGO_ENABLED=0 go build -v -ldflags "-X main.Version=${{ github.sha }}" -o vz-mqtt-dbus-gateway-${{ env.BRANCH_NAME }} .

      - name: Test
        run: go test -v ./...

      - name: Lowercase repo and owner
        run: |
          echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push snapshot Docker image
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            BINARY_NAME=vz-mqtt-dbus-gateway-${{ env.BRANCH_NAME }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}:${{ github.sha }}-${{ env.BRANCH_NAME }}
            ghcr.io/${{ env.REPO_LOWER }}:latest-${{ env.BRANCH_NAME }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
