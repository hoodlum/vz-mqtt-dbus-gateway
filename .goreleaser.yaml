# .goreleaser.yaml
before:
  hooks:
    - go mod tidy

builds:
  - env: [CGO_ENABLED=0]
    goos:
      - linux
    goarch:
      - arm
      - amd64
    goarm:
      - 7
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Version }}-snapshot-{{.ShortCommit}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers:
  - image_templates:
      - "ghcr.io/hoodlum/{{ .ProjectName }}:{{ .Version }}-amd64"
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description={{ .ProjectName }}"
      - "--label=org.opencontainers.image.url=https://github.com/hoodlum/{{ .ProjectName }}"
      - "--label=org.opencontainers.image.source=https://github.com/hoodlum/{{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

  - image_templates:
      - "ghcr.io/hoodlum/{{ .ProjectName }}:{{ .Version }}-armv7"
    goos: linux
    goarch: arm
    goarm: 7
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm/v7"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description={{ .ProjectName }}"
      - "--label=org.opencontainers.image.url=https://github.com/hoodlum/{{ .ProjectName }}"
      - "--label=org.opencontainers.image.source=https://github.com/hoodlum/{{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

docker_manifests:
  - name_template: "ghcr.io/hoodlum/{{ .ProjectName }}:{{ .Version }}"
    image_templates:
      - "ghcr.io/hoodlum/{{ .ProjectName }}:{{ .Version }}-amd64"
      - "ghcr.io/hoodlum/{{ .ProjectName }}:{{ .Version }}-armv7"
  - name_template: "ghcr.io/hoodlum/{{ .ProjectName }}:latest"
    image_templates:
      - "ghcr.io/hoodlum/{{ .ProjectName }}:{{ .Version }}-amd64"
      - "ghcr.io/hoodlum/{{ .ProjectName }}:{{ .Version }}-armv7"
